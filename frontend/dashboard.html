<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendSense — Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard">
        <div class="dashboard-header">
            <h1>SpendSense</h1>
            <button class="btn-logout" id="logout-btn">Sign Out</button>
        </div>

        <!-- Add Transaction -->
        <div class="section">
            <h2 class="section-title">Add Transaction</h2>
            <div class="card" style="max-width:100%">
                <form id="add-txn-form" style="display:flex;flex-wrap:wrap;gap:0.75rem;align-items:end">
                    <div class="form-group" style="flex:1;min-width:120px;margin:0">
                        <label for="txn-amount">Amount (£)</label>
                        <input type="text" id="txn-amount" placeholder="" required>
                    </div>
                    <div class="form-group" style="flex:2;min-width:180px;margin:0">
                        <label for="txn-desc">Description</label>
                        <input type="text" id="txn-desc" placeholder="" required>
                    </div>
                    <div class="form-group" style="flex:1;min-width:120px;margin:0">
                        <label for="txn-merchant">Merchant</label>
                        <input type="text" id="txn-merchant" placeholder="">
                    </div>
                    <div class="form-group" style="flex:1;min-width:130px;margin:0">
                        <label for="txn-date">Date</label>
                        <input type="date" id="txn-date" required>
                    </div>
                    <button type="submit" class="btn-primary" style="width:auto;padding:0.7rem 1.5rem;margin:0">Add</button>
                </form>
                <p style="margin-top:0.6rem;font-size:0.75rem;color:var(--text-light)">Use negative amounts for spending (e.g. -45.50) and positive for money received (e.g. 2500)</p>
                <div id="add-txn-msg" style="margin-top:0.5rem;font-size:0.8rem;color:var(--success);display:none"></div>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="stats-grid">
            <div class="stat-card"><div class="value" id="total-spend">—</div><div class="label">This Month</div></div>
            <div class="stat-card"><div class="value" id="txn-count">—</div><div class="label">Transactions</div></div>
            <div class="stat-card"><div class="value" id="top-category">—</div><div class="label">Top Category</div></div>
            <div class="stat-card"><div class="value" id="anomaly-count">—</div><div class="label">Anomalies</div></div>
        </div>

        <!-- Categories breakdown -->
        <div class="section">
            <h2 class="section-title">Spending by Category</h2>
            <ul class="category-list" id="category-list"></ul>
        </div>

        <!-- Recent transactions -->
        <div class="section">
            <h2 class="section-title">Recent Transactions</h2>
            <div id="txn-list"></div>
        </div>

        <!-- Anomalies -->
        <div class="section" id="anomaly-section" style="display:none">
            <h2 class="section-title">Flagged Anomalies</h2>
            <div id="anomaly-list"></div>
        </div>
    </div>

    <script>
        const API = '';
        const token = localStorage.getItem('token');

        if (!token) { window.location.href = 'login.html'; }

        const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        });

        async function updateCategory(id, category) {
            await fetch(API + `/transactions/${id}?category=${category}`, { method: 'PATCH', headers });
            loadDashboard();
        }

        async function deleteTxn(id) {
            if (!confirm('Delete this transaction?')) return;
            await fetch(API + `/transactions/${id}`, { method: 'DELETE', headers });
            loadDashboard();
        }

        async function loadDashboard() {
            try {
                const [summaryRes, txnRes, anomalyRes] = await Promise.all([
                    fetch(API + '/insights/summary', { headers }),
                    fetch(API + '/transactions?limit=15', { headers }),
                    fetch(API + '/insights/anomalies', { headers })
                ]);

                if (summaryRes.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = 'login.html';
                    return;
                }

                const summary = await summaryRes.json();
                const transactions = await txnRes.json();
                const anomalies = await anomalyRes.json();

                // Stats
                document.getElementById('total-spend').textContent = '£' + summary.total_spend.toFixed(0);
                document.getElementById('txn-count').textContent = summary.transaction_count;
                document.getElementById('top-category').textContent = summary.categories.length > 0
                    ? summary.categories[0].category : '—';
                document.getElementById('anomaly-count').textContent = anomalies.length;

                // Categories
                const catList = document.getElementById('category-list');
                catList.innerHTML = summary.categories.map(c =>
                    `<li class="category-item">
                        <span class="name">${c.category}</span>
                        <span><span class="amount">£${c.total.toFixed(2)}</span><span class="pct">${c.percentage}%</span></span>
                    </li>`
                ).join('');

                // Transactions
                const txnList = document.getElementById('txn-list');
                const categories = ['groceries','dining','transport','subscriptions','utilities','rent','shopping','health','entertainment','transfers','income','other'];

                txnList.innerHTML = transactions.map(t => {
                    const isNeg = t.amount < 0;
                    const badge = t.is_anomaly ? '<span class="anomaly-badge">ANOMALY</span>' : '';
                    const options = categories.map(c => `<option value="${c}" ${c === t.category ? 'selected' : ''}>${c}</option>`).join('');
                    return `<div class="txn-item" data-id="${t.id}">
                        <span class="desc">${t.description}${badge}</span>
                        <select class="cat-select" onchange="updateCategory(${t.id}, this.value)">${options}</select>
                        <span class="amount ${isNeg ? 'negative' : 'positive'}">${isNeg ? '-' : '+'}£${Math.abs(t.amount).toFixed(2)}</span>
                        <button class="btn-delete" onclick="deleteTxn(${t.id})" title="Delete">✕</button>
                    </div>`;
                }).join('');

                // Anomalies
                if (anomalies.length > 0) {
                    document.getElementById('anomaly-section').style.display = 'block';
                    document.getElementById('anomaly-list').innerHTML = anomalies.map(a =>
                        `<div class="txn-item anomaly-item" onclick="this.querySelector('.anomaly-reason').classList.toggle('visible')">
                            <span class="desc">${a.description}<span class="anomaly-badge">⚠</span></span>
                            <span class="cat-select" style="pointer-events:none;border:none;background:none;font-size:0.7rem;color:var(--text-light)">${a.category}</span>
                            <span class="amount negative">-£${Math.abs(a.amount).toFixed(2)}</span>
                            <div class="anomaly-reason">${a.reason}</div>
                        </div>`
                    ).join('');
                }
            } catch (e) {
                console.error('Dashboard load error:', e);
            }
        }

        loadDashboard();

        // Add transaction form
        document.getElementById('txn-date').valueAsDate = new Date();

        document.getElementById('add-txn-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('add-txn-msg');
            msg.style.display = 'none';

            const amount = parseFloat(document.getElementById('txn-amount').value);
            const description = document.getElementById('txn-desc').value;
            const merchant = document.getElementById('txn-merchant').value || null;
            const date = document.getElementById('txn-date').value + 'T12:00:00';

            try {
                const res = await fetch(API + '/transactions', {
                    method: 'POST',
                    headers,
                    body: JSON.stringify({ amount, description, merchant, date })
                });

                if (!res.ok) throw new Error('Failed to add');

                const txn = await res.json();
                msg.textContent = `Added: ${txn.description} → ${txn.category} (£${Math.abs(txn.amount).toFixed(2)})`;
                msg.style.display = 'block';
                msg.style.color = 'var(--success)';

                document.getElementById('txn-amount').value = '';
                document.getElementById('txn-desc').value = '';
                document.getElementById('txn-merchant').value = '';

                // Refresh dashboard
                loadDashboard();
            } catch (err) {
                msg.textContent = 'Failed to add transaction';
                msg.style.display = 'block';
                msg.style.color = 'var(--danger)';
            }
        });
    </script>
</body>
</html>
